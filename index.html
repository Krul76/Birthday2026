<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Krul’s Birthday Movie</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eaf7ff 0%, #ffffff 100%);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: #4f8fc9;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .page {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #b7dcf4;
      box-shadow: 0 8px 24px rgba(120, 170, 210, 0.18);
      padding: 24px 18px 28px;
      text-align: center;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      letter-spacing: 0.08em;
      color: #5a9fd5;
      font-weight: normal;
    }

    .lead {
      margin: 0 0 24px;
      font-size: 14px;
      line-height: 2;
      color: #6b9fca;
      letter-spacing: 0.08em;
    }

    .movie {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid #c9e6f8;
      background: #ffffff;
      overflow: hidden;
    }

    .movie-cover {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      display: block;
    }

    .movie-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .play-button {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      width: 78px;
      height: 78px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      color: #6ea6d6;
      font-size: 32px;
      line-height: 78px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(120, 170, 210, 0.22);
      padding-left: 4px;
      box-sizing: border-box;
    }

    .movie iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .message {
      margin: 24px 0 0;
      font-size: 14px;
      line-height: 2;
      color: #6b9fca;
      letter-spacing: 0.08em;
    }

    .deco {
      margin-top: 22px;
      font-size: 14px;
      color: #9fc9e8;
      letter-spacing: 0.14em;
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .page {
        padding: 22px 16px 26px;
      }

      h1 {
        font-size: 22px;
      }

      .lead,
      .message {
        font-size: 13px;
      }

      .play-button {
        width: 66px;
        height: 66px;
        font-size: 28px;
        line-height: 66px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>Krul’s Birthday Movie</h1>

    <p class="lead">
      今回の生誕メイキング動画です！<br>
      たくさん頑張って準備しました🤍
    </p>

    <div class="movie" id="movieBox">
      <button class="movie-cover" id="playMovie" aria-label="動画を再生">
        <img src="thumbnail.jpg" alt="Krul Birthday Movie サムネイル">
        <span class="play-button">▶</span>
      </button>
    </div>

    <p class="message">
      ボンボヤージュオプションの<br>
      ご注文ありがとうございました🤍
    </p>

    <div class="deco">✧ Krul’s Birthday Voyage ✧</div>
  </main>

  <script>
    document.getElementById("playMovie").addEventListener("click", function () {
      const movieBox = document.getElementById("movieBox");

      movieBox.innerHTML = `
        <iframe
          src="https://www.youtube-nocookie.com/embed/CdhpqWemzL4?autoplay=1"
          title="Krul’s Birthday Movie"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      `;
    });
  </script>
</body>
</html>
